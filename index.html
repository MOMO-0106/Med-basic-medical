<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Med-Basic 医療英単語</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00c9a7">
<script>
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js');
  }
</script>
<style>
  :root {
    /* System font stack — fully offline, no CDN */
    --font-serif: Georgia, 'Times New Roman', serif;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', 'Yu Gothic', sans-serif;
    /* Colors */
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1e2530;
    --border: #30363d;
    --accent: #00c9a7;
    --accent2: #ff6b6b;
    --accent3: #ffd166;
    --text: #e6edf3;
    --text-muted: #7d8590;
    --correct: #00c9a7;
    --wrong: #ff6b6b;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,201,167,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,201,167,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  #app {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 1;
  }

  header {
    padding: 20px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(13,17,23,0.9);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .logo {
    font-family: var(--font-serif);
    font-size: 22px;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .logo span {
    color: var(--text-muted);
    font-style: italic;
    font-size: 14px;
    margin-left: 4px;
  }

  .stats-bar {
    display: flex;
    gap: 12px;
    font-size: 12px;
    font-weight: 500;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
  }

  .stat-val {
    font-size: 16px;
    font-weight: 600;
  }

  .stat-val.correct { color: var(--correct); }
  .stat-val.wrong { color: var(--wrong); }
  .stat-val.total { color: var(--accent3); }
  .stat-label { color: var(--text-muted); font-size: 10px; }

  .screen { display: none; flex-direction: column; flex: 1; padding: 24px 20px; animation: fadeIn 0.3s ease; }
  .screen.active { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .home-hero {
    text-align: center;
    padding: 32px 0 28px;
  }

  .home-hero .big-title {
    font-family: var(--font-serif);
    font-size: 42px;
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 8px;
  }

  .home-hero .big-title em {
    color: var(--accent);
    font-style: italic;
  }

  .home-hero p {
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .badge-count {
    display: inline-block;
    background: rgba(0,201,167,0.12);
    border: 1px solid rgba(0,201,167,0.3);
    color: var(--accent);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 13px;
    font-weight: 500;
  }

  .mode-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }

  .mode-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 16px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .mode-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    transform: scaleX(0);
    transition: transform 0.2s;
  }

  .mode-card:active::before,
  .mode-card.selected::before { transform: scaleX(1); }
  .mode-card.selected {
    border-color: var(--accent);
    background: rgba(0,201,167,0.06);
  }

  .mode-icon { font-size: 28px; margin-bottom: 8px; }
  .mode-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .mode-desc { font-size: 11px; color: var(--text-muted); line-height: 1.4; }

  .difficulty-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  .diff-btn {
    flex: 1;
    padding: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-muted);
    font-family: var(--font-sans);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .diff-btn.selected {
    border-color: var(--accent3);
    background: rgba(255,209,102,0.08);
    color: var(--accent3);
  }

  .start-btn {
    width: 100%;
    padding: 18px;
    background: var(--accent);
    color: #0d1117;
    border: none;
    border-radius: var(--radius);
    font-family: var(--font-sans);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  .start-btn:active { transform: scale(0.98); opacity: 0.9; }

  .quiz-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .progress-wrap {
    flex: 1;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
    margin-right: 12px;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #00e5c8);
    border-radius: 2px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  }

  .q-count {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .mode-badge {
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-left: 8px;
  }

  .mode-badge.en-ja { background: rgba(0,201,167,0.15); color: var(--accent); }
  .mode-badge.ja-en { background: rgba(255,107,107,0.15); color: var(--accent2); }
  .mode-badge.mix { background: rgba(255,209,102,0.15); color: var(--accent3); }

  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    text-align: center;
    margin-bottom: 20px;
    position: relative;
    min-height: 140px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .question-card::after {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 20px;
    background: linear-gradient(135deg, rgba(0,201,167,0.1), transparent 50%);
    pointer-events: none;
  }

  .q-direction {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .q-word-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    justify-content: center;
  }

  .q-word {
    font-family: var(--font-serif);
    font-size: 36px;
    line-height: 1.2;
    color: var(--text);
    margin: 0;
    word-break: break-word;
  }

  .q-word.japanese {
    font-family: var(--font-sans);
    font-size: 28px;
    font-weight: 300;
  }

  .speak-btn {
    background: rgba(0,201,167,0.15);
    border: 1.5px solid var(--accent);
    border-radius: 50%;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 20px;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .speak-btn:active { transform: scale(0.9); }

  .choices-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }

  .choice-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 16px 12px;
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    line-height: 1.4;
    word-break: break-word;
    min-height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .choice-btn:active:not(:disabled) {
    transform: scale(0.97);
  }

  .choice-btn.correct-answer {
    background: rgba(0,201,167,0.15);
    border-color: var(--correct);
    color: var(--correct);
    font-weight: 600;
  }

  .choice-btn.wrong-answer {
    background: rgba(255,107,107,0.12);
    border-color: var(--wrong);
    color: var(--wrong);
  }

  .choice-btn:disabled { cursor: default; }

  .input-wrap {
    margin-bottom: 20px;
  }

  .answer-input {
    width: 100%;
    padding: 16px 18px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 10px;
  }

  .answer-input:focus { border-color: var(--accent); }
  .answer-input.correct { border-color: var(--correct); background: rgba(0,201,167,0.08); }
  .answer-input.wrong { border-color: var(--wrong); background: rgba(255,107,107,0.08); }

  .submit-btn {
    width: 100%;
    padding: 14px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .submit-btn:active { transform: scale(0.98); }

  .feedback {
    text-align: center;
    padding: 14px;
    border-radius: var(--radius);
    margin-bottom: 16px;
    font-weight: 600;
    font-size: 15px;
    animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
    display: none;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  .feedback.show { display: block; }
  .feedback.correct { background: rgba(0,201,167,0.15); color: var(--correct); }
  .feedback.wrong { background: rgba(255,107,107,0.12); color: var(--wrong); }

  .explanation {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 14px;
    margin-bottom: 16px;
    font-size: 12px;
    line-height: 1.6;
    display: none;
  }

  .explanation.show { display: block; }

  .exp-answer {
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 6px;
  }

  .exp-example {
    color: var(--text-muted);
    font-style: italic;
  }

  /* next-btn is defined in the action-row section below */

  .result-screen {
    text-align: center;
    padding: 32px 20px;
  }

  .result-icon {
    font-size: 64px;
    margin-bottom: 16px;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }

  .result-title {
    font-family: var(--font-serif);
    font-size: 32px;
    margin-bottom: 8px;
  }

  .result-score {
    font-size: 56px;
    font-weight: 700;
    color: var(--accent);
    margin: 16px 0 4px;
    font-family: var(--font-serif);
  }

  .result-sub {
    color: var(--text-muted);
    font-size: 14px;
    margin-bottom: 32px;
  }

  .result-cards {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 28px;
  }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 8px;
  }

  .result-card .val {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .result-card .lbl {
    font-size: 11px;
    color: var(--text-muted);
  }

  .result-card.c .val { color: var(--correct); }
  .result-card.w .val { color: var(--wrong); }
  .result-card.r .val { color: var(--accent3); }

  .result-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .btn-primary {
    padding: 16px;
    background: var(--accent);
    color: #0d1117;
    border: none;
    border-radius: var(--radius);
    font-family: var(--font-sans);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary:active { transform: scale(0.98); }

  .btn-secondary {
    padding: 14px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-secondary:active { transform: scale(0.98); }

  .wrong-list-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    text-align: left;
    margin-bottom: 10px;
    margin-top: 4px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .wrong-list {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 20px;
    text-align: left;
    max-height: 220px;
    overflow-y: auto;
  }

  .wrong-item {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }

  .wrong-item:last-child { border-bottom: none; }

  .wrong-en {
    font-size: 13px;
    font-weight: 500;
    color: var(--accent2);
  }

  .wrong-ja {
    font-size: 12px;
    color: var(--text-muted);
    text-align: right;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Home button in quiz header */
  .home-icon-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text-muted);
    font-size: 18px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    margin-right: 10px;
    flex-shrink: 0;
    transition: all 0.2s;
    line-height: 1;
    padding: 0;
    font-family: system-ui;
  }
  .home-icon-btn:active { transform: scale(0.92); background: var(--surface2); }

  /* Action row: skip + next side by side */
  .action-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }

  .skip-btn {
    flex: 1;
    padding: 16px;
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-muted);
    font-family: var(--font-sans);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .skip-btn:active { transform: scale(0.98); background: var(--surface2); }
  .skip-btn:disabled { opacity: 0.3; cursor: default; }

  .next-btn {
    flex: 2;
    padding: 16px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
  }
  .next-btn.show { display: block; animation: fadeIn 0.2s ease; }
  .next-btn:active { transform: scale(0.98); }

  /* Confirm dialog */
  .overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.65);
    z-index: 100;
  }
  .overlay.show { display: block; }

  .confirm-dialog {
    display: none;
    position: fixed;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px 20px;
    z-index: 101;
    width: calc(100% - 48px);
    max-width: 360px;
    text-align: center;
  }
  .confirm-dialog.show { display: block; }
  .confirm-icon { font-size: 40px; margin-bottom: 12px; }
  .confirm-title { font-family: var(--font-serif); font-size: 20px; margin-bottom: 6px; }
  .confirm-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
  .confirm-actions { display: flex; gap: 10px; }
  .confirm-yes {
    flex: 1; padding: 13px;
    background: var(--accent2);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: var(--font-sans);
    font-size: 14px; font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .confirm-yes:active { opacity: 0.8; }
  .confirm-no {
    flex: 1; padding: 13px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 14px; font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .confirm-no:active { opacity: 0.8; }

  /* Speak button speaking animation */
  .speak-btn.speaking {
    background: rgba(0,201,167,0.35);
    animation: pulse-ring 0.7s ease infinite;
  }
  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 rgba(0,201,167,0.5); }
    70%  { box-shadow: 0 0 0 8px rgba(0,201,167,0); }
    100% { box-shadow: 0 0 0 0 rgba(0,201,167,0); }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">Med<em>-</em>Basic <span>医療英単語</span></div>
    <div class="stats-bar">
      <div class="stat">
        <div class="stat-val correct" id="hdr-correct">0</div>
        <div class="stat-label">正解</div>
      </div>
      <div class="stat">
        <div class="stat-val wrong" id="hdr-wrong">0</div>
        <div class="stat-label">不正解</div>
      </div>
      <div class="stat">
        <div class="stat-val total" id="hdr-total">0</div>
        <div class="stat-label">累計</div>
      </div>
    </div>
  </header>

  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div class="home-hero">
      <div class="big-title">Learn<br><em>Medical</em><br>English</div>
      <p>医療現場で使う英単語を<br>効率よく覚えよう</p>
      <div class="badge-count" id="word-count-badge">全 0 語収載</div>
    </div>

    <div style="margin-bottom:12px;">
      <div style="font-size:12px;font-weight:600;color:var(--text-muted);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:10px;">出題モード</div>
      <div class="mode-grid">
        <div class="mode-card selected" data-mode="mix" onclick="selectMode('mix',this)">
          <div class="mode-icon">🔀</div>
          <div class="mode-title">ミックス</div>
          <div class="mode-desc">英→日と日→英をランダムに出題</div>
        </div>
        <div class="mode-card" data-mode="en-ja" onclick="selectMode('en-ja',this)">
          <div class="mode-icon">🇺🇸</div>
          <div class="mode-title">英語→日本語</div>
          <div class="mode-desc">英単語を見て日本語を答える</div>
        </div>
        <div class="mode-card" data-mode="ja-en" onclick="selectMode('ja-en',this)">
          <div class="mode-icon">🇯🇵</div>
          <div class="mode-title">日本語→英語</div>
          <div class="mode-desc">日本語を見て英単語を答える</div>
        </div>
        <div class="mode-card" data-mode="wrong" onclick="selectMode('wrong',this)">
          <div class="mode-icon">📌</div>
          <div class="mode-title">苦手復習</div>
          <div class="mode-desc">間違えた単語だけを再出題</div>
        </div>
      </div>
    </div>

// ===================== SYNONYM GROUPS =====================
// Each group = list of English words that are interchangeable answers.
// Also used for Japanese partial-match: any one segment of a "・"-joined meaning counts.
const SYNONYM_GROUPS = [
  // British/American spelling variants
  ["sick", "ill"],
  ["labor", "labour"],
  ["feces", "faeces"],
  ["fetus", "foetus"],
  ["esophagus", "oesophagus"],
  ["diaper", "nappy"],
  ["cold sore", "fever blister"],
  ["testis", "testes"],
  ["atrium", "atria"],

  // Medically similar / interchangeable concepts
  ["wound", "injury"],                          // 傷・外傷
  ["treatment", "cure"],                         // 治療・治癒
  ["constant", "persistent"],                    // 持続的な・遷延する
  ["serious", "critical", "severe"],             // 重篤な・重度の
  ["illness", "disease", "sickness"],            // 病気・疾患
  ["operation", "surgery"],                      // 手術
  ["medication", "medicine"],                    // 薬・投薬
  ["pain", "ache"],                              // 痛み
  ["nausea", "throw up"],                        // 吐き気・嘔吐(近接)
  ["fatigue", "drowsiness"],                     // 疲労・眠気(近接)
  ["dizzy", "light-headed"],                     // めまい・立ちくらみ
  ["blurry", "near-sighted", "far-sightedness"], // 視力関係(近接)
  ["lump", "bump"],                              // しこり・こぶ
  ["rash", "hives"],                             // 発疹・蕁麻疹
  ["cough", "sneeze"],                           // 咳・くしゃみ(近接)
  ["stuffy nose", "runny nose"],                 // 鼻づまり・鼻水
  ["fracture", "broken"],                        // 骨折
  ["inpatient", "hospitalization"],              // 入院患者・入院
  ["outpatient", "clinic"],                      // 外来
  ["doctor", "surgeon", "dentist", "pharmacist","therapist","midwife","nurse"], // 医療職
  ["tablet", "powder"],                          // 錠剤・粉薬(剤形)
  ["injection", "drip", "syringe"],              // 注射・点滴・注射器
  ["symptom", "sign"],                           // 症状・徴候
  ["infection", "inflammation"],                 // 感染症・炎症
  ["allergy", "anaphylaxis"],                    // アレルギー・アナフィラキシー
  ["bandage", "cast", "plaster"],                // 包帯・ギプス・絆創膏
  ["vein", "artery"],                            // 静脈・動脈
  ["stomach", "intestine", "bowel", "colon", "rectum"], // 消化管
  ["lung", "spleen", "liver", "kidney", "pancreas", "gallbladder"], // 臓器
  ["red blood cell", "white blood cell", "platelet", "plasma"], // 血液成分
  ["pass away", "pass out"],                     // 意識・死亡(近接ではないが混同多い→別扱い)
];

// Build fast lookup: word → set of acceptable English alternatives
const SYNONYM_MAP = {};
for (const group of SYNONYM_GROUPS) {
  for (const word of group) {
    SYNONYM_MAP[word.toLowerCase()] = group.map(w => w.toLowerCase()).filter(w => w !== word.toLowerCase());
  }
}

// ===================== SOUND EFFECTS =====================
function playCorrectSound() {
  const audioContext = new (window.AudioContext || window.webkitAudioContext)();
  const time = audioContext.currentTime;
  
  const osc1 = audioContext.createOscillator();
  const osc2 = audioContext.createOscillator();
  const gain = audioContext.createGain();
  
  osc1.connect(gain);
  osc2.connect(gain);
  gain.connect(audioContext.destination);
  
  osc1.frequency.setValueAtTime(523.25, time); // C5
  osc2.frequency.setValueAtTime(659.25, time); // E5
  
  gain.gain.setValueAtTime(0.3, time);
  gain.gain.exponentialRampToValueAtTime(0.01, time + 0.3);
  
  osc1.start(time);
  osc2.start(time);
  osc1.stop(time + 0.3);
  osc2.stop(time + 0.3);
}

function playWrongSound() {
  const audioContext = new (window.AudioContext || window.webkitAudioContext)();
  const time = audioContext.currentTime;
  
  const osc = audioContext.createOscillator();
  const gain = audioContext.createGain();
  
  osc.connect(gain);
  gain.connect(audioContext.destination);
  
  osc.frequency.setValueAtTime(300, time);
  osc.frequency.exponentialRampToValueAtTime(100, time + 0.2);
  
  gain.gain.setValueAtTime(0.3, time);
  gain.gain.exponentialRampToValueAtTime(0.01, time + 0.2);
  
  osc.start(time);
  osc.stop(time + 0.2);
}

// ===================== SPEECH SYNTHESIS =====================
// WebIntoApp WebView TTS — 3段階フォールバック
// 方法1: Android JavaScriptブリッジ (WebIntoApp独自)
// 方法2: window.speechSynthesis (標準WebView)
// 方法3: どちらも不可の場合はボタンを無効化して通知

let ttsMethod = null; // 'bridge' | 'web' | 'none'
let usVoice = null;

// 起動時にどの方法が使えるか判定
function detectTTS() {
  // WebIntoApp / 一部WebViewは Android.tts ブリッジを提供する
  if (window.Android && typeof window.Android.speak === 'function') {
    ttsMethod = 'bridge';
    return;
  }
  // 標準 Web Speech API
  if ('speechSynthesis' in window) {
    ttsMethod = 'web';
    initWebVoice();
    return;
  }
  ttsMethod = 'none';
}

function initWebVoice() {
  function pick() {
    const voices = window.speechSynthesis.getVoices();
    if (!voices || voices.length === 0) return false;
    const priority = ['Samantha','Google US English',
                      'Microsoft David Desktop','Alex','Karen'];
    for (const name of priority) {
      const v = voices.find(v => v.name === name);
      if (v) { usVoice = v; return true; }
    }
    usVoice = voices.find(v => v.lang === 'en-US')
           || voices.find(v => v.lang && v.lang.startsWith('en'))
           || voices[0] || null;
    return true;
  }
  if (!pick()) {
    window.speechSynthesis.onvoiceschanged = pick;
    // ポーリングでフォールバック（一部WebViewはイベント未発火）
    let n = 0;
    const t = setInterval(() => { if (pick() || n++ > 30) clearInterval(t); }, 300);
  }
}

// 画面ロード直後に検出
detectTTS();

function speakWord() {
  if (!quiz || qIndex >= quiz.length) return;
  const q = quiz[qIndex];
  if (!q) return;

  // "labor / labour" などの表記ゆれを除去して英語部分だけ取得
  const text = q.word[0].replace(/\s*[\/,]\s*.+$/, '').trim();
  if (!text) return;

  const btn = document.getElementById('speak-btn');

  // ---- 方法1: Android JavaScriptブリッジ ----
  if (ttsMethod === 'bridge') {
    try {
      window.Android.speak(text, 'en-US');
      if (btn) {
        btn.classList.add('speaking');
        setTimeout(() => btn && btn.classList.remove('speaking'), 1500);
      }
    } catch(e) {
      ttsMethod = 'web';
      speakWord(); // 失敗したら方法2で再試行
    }
    return;
  }

  // ---- 方法2: Web Speech API ----
  if (ttsMethod === 'web') {
    try {
      window.speechSynthesis.cancel();
      if (window.speechSynthesis.paused) window.speechSynthesis.resume();

      const utter = new SpeechSynthesisUtterance(text);
      utter.lang   = 'en-US';
      utter.rate   = 0.85;
      utter.pitch  = 1.0;
      utter.volume = 1.0;
      if (usVoice) utter.voice = usVoice;

      if (btn) btn.classList.add('speaking');
      utter.onend   = () => { if (btn) btn.classList.remove('speaking'); };
      utter.onerror = () => { if (btn) btn.classList.remove('speaking'); };

      // ★ setTimeout なし — クリック直後の同期処理内で呼ぶ（Chrome必須）
      window.speechSynthesis.speak(utter);

      // Android WebView stall 対策（500ms後に paused なら resume）
      setTimeout(() => {
        if (window.speechSynthesis.paused) window.speechSynthesis.resume();
      }, 500);
    } catch(e) {
      if (btn) btn.classList.remove('speaking');
    }
    return;
  }

  // ---- 方法3: TTS不可 ----
  if (btn) {
    btn.textContent = '✕';
    btn.title = 'この端末では発音機能が使えません';
    btn.style.opacity = '0.4';
    btn.onclick = null;
  }
}

// ===================== STRING MATCHING =====================
function levenshteinDistance(a, b) {
  const m = a.length;
  const n = b.length;
  const dp = Array(n + 1).fill(0).map(() => Array(m + 1).fill(0));
  
  for (let i = 0; i <= m; i++) dp[0][i] = i;
  for (let j = 0; j <= n; j++) dp[j][0] = j;
  
  for (let j = 1; j <= n; j++) {
    for (let i = 1; i <= m; i++) {
      const cost = a[i - 1] === b[j - 1] ? 0 : 1;
      dp[j][i] = Math.min(
        dp[j][i - 1] + 1,
        dp[j - 1][i] + 1,
        dp[j - 1][i - 1] + cost
      );
    }
  }
  return dp[n][m];
}

function normalize(s) {
  return s.toLowerCase()
    .replace(/[・\s\/\[\]「」（）()\-]/g, '')
    .replace(/，|、|。/g, '')
    .trim();
}

// Split a Japanese meaning string into individual segments
// e.g. "しこり・腫瘤" → ["しこり", "腫瘤"]
// e.g. "（持続的な）痛み" → ["持続的な痛み", "痛み"]
function splitJaMeanings(ja) {
  return ja
    .split(/[・、\/]/)
    .map(s => s.replace(/[（）()【】\[\]]/g, '').trim())
    .filter(s => s.length > 0);
}

function matchesAnswer(userInput, correctAnswer, isEnJa) {
  const userN = normalize(userInput);
  if (!userN) return false;

  if (isEnJa) {
    // ---- Japanese answer: user types Japanese, correct is Japanese ----
    // 1. Exact match (normalized)
    if (userN === normalize(correctAnswer)) return true;

    // 2. Partial match: any one segment of the meaning counts
    const segments = splitJaMeanings(correctAnswer);
    for (const seg of segments) {
      const segN = normalize(seg);
      if (segN && userN === segN) return true;
      // Allow 1 char typo for segments longer than 4 chars
      if (segN.length > 4 && levenshteinDistance(userN, segN) <= 1) return true;
    }
    return false;
  } else {
    // ---- English answer: user types English, correct is English ----
    const correctN = normalize(correctAnswer);

    // 1. Exact match
    if (userN === correctN) return true;

    // 2. Levenshtein on canonical answer (2-char tolerance)
    if (levenshteinDistance(userN, correctN) <= 2) return true;

    // 3. Synonym group: any word in the same group counts
    const alts = SYNONYM_MAP[correctN] || SYNONYM_MAP[correctAnswer.toLowerCase()] || [];
    for (const alt of alts) {
      const altN = normalize(alt);
      if (userN === altN) return true;
      if (levenshteinDistance(userN, altN) <= 2) return true;
    }

    // 4. Handle "word1 / word2" style entries (e.g. "labor / labour")
    if (correctAnswer.includes('/')) {
      for (const part of correctAnswer.split('/')) {
        const partN = normalize(part);
        if (userN === partN) return true;
        if (levenshteinDistance(userN, partN) <= 2) return true;
      }
    }

    return false;
  }
}

// ===================== QUIZ LOGIC =====================
// Cryptographically stronger random (falls back to Math.random)
function secureRandom() {
  if (window.crypto && window.crypto.getRandomValues) {
    const arr = new Uint32Array(1);
    window.crypto.getRandomValues(arr);
    return arr[0] / (0xFFFFFFFF + 1);
  }
  return Math.random();
}

// Double-pass Fisher-Yates with secure random for strong shuffling
function shuffle(arr) {
  const a = [...arr];
  // First pass
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(secureRandom() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  // Second pass (eliminates any residual bias)
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(secureRandom() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  sessionWrongWords = [];
  answered = false;

  let pool;
  if (selectedMode === 'wrong') {
    if (wrongWords.length === 0) {
      alert('苦手単語がまだありません。他のモードで練習してください。');
      return;
    }
    pool = wrongWords.map(w => WORDS.find(x => x[0] === w)).filter(Boolean);
  } else {
    pool = [...WORDS];
  }

  pool = shuffle(pool);
  if (selectedQ > 0) pool = pool.slice(0, selectedQ);

  quiz = pool.map(w => {
    let dir;
    if (selectedMode === 'en-ja') dir = 'en-ja';
    else if (selectedMode === 'ja-en') dir = 'ja-en';
    else dir = 'mix'; // assigned after shuffle below
    return { word: w, dir };
  });

  // For mix mode: guarantee exactly 50/50 split then re-shuffle directions
  if (selectedMode === 'mix') {
    const half = Math.floor(quiz.length / 2);
    const dirs = shuffle([
      ...Array(half).fill('en-ja'),
      ...Array(quiz.length - half).fill('ja-en')
    ]);
    quiz.forEach((q, i) => q.dir = dirs[i]);
  }

  qIndex = 0;
  showScreen('quiz');
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = quiz[qIndex];
  const total = quiz.length;
  const pct = (qIndex / total) * 100;

  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('q-count').textContent = `${qIndex + 1} / ${total}`;

  const badge = document.getElementById('mode-badge');
  if (selectedMode === 'en-ja' || q.dir === 'en-ja') {
    badge.textContent = 'EN→JA';
    badge.className = 'mode-badge en-ja';
  } else if (selectedMode === 'ja-en' || q.dir === 'ja-en') {
    badge.textContent = 'JA→EN';
    badge.className = 'mode-badge ja-en';
  } else {
    badge.textContent = 'MIX';
    badge.className = 'mode-badge mix';
  }

  const isEnJa = q.dir === 'en-ja';
  document.getElementById('q-direction').textContent = isEnJa ? '英語 → 日本語' : '日本語 → 英語';

  const qWordEl = document.getElementById('q-word');
  qWordEl.textContent = isEnJa ? q.word[0] : q.word[1];
  qWordEl.className = 'q-word' + (isEnJa ? '' : ' japanese');

  const speakBtn = document.getElementById('speak-btn');
  speakBtn.style.display = isEnJa ? 'flex' : 'none';

  currentAnswer = isEnJa ? q.word[1] : q.word[0];
  currentExample = q.word[2];
  currentIsEnJa = isEnJa;

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('explanation').className = 'explanation';
  document.getElementById('next-btn').className = 'next-btn';
  document.getElementById('skip-btn').disabled = false;

  if (selectedType === 'choice') {
    document.getElementById('choices-wrap').style.display = 'grid';
    document.getElementById('input-wrap').style.display = 'none';
    renderChoices(q, isEnJa);
  } else {
    document.getElementById('choices-wrap').style.display = 'none';
    document.getElementById('input-wrap').style.display = 'block';
    const inp = document.getElementById('answer-input');
    inp.value = '';
    inp.className = 'answer-input';
    inp.disabled = false;
    setTimeout(() => inp.focus(), 100);
  }
}

function renderChoices(q, isEnJa) {
  const correct = isEnJa ? q.word[1] : q.word[0];
  const pool = WORDS.filter(w => w !== q.word);
  const distractors = shuffle(pool).slice(0, 3).map(w => isEnJa ? w[1] : w[0]);
  const options = shuffle([correct, ...distractors]);

  const btns = document.querySelectorAll('.choice-btn');
  options.forEach((opt, i) => {
    btns[i].textContent = opt;
    btns[i].className = 'choice-btn';
    btns[i].disabled = false;
  });
}

function checkChoice(idx) {
  if (answered) return;
  answered = true;
  const btns = document.querySelectorAll('.choice-btn');
  const selected = btns[idx].textContent;
  const isCorrect = matchesAnswer(selected, currentAnswer, currentIsEnJa);

  btns.forEach(b => {
    b.disabled = true;
    if (matchesAnswer(b.textContent, currentAnswer, currentIsEnJa)) {
      b.classList.add('correct-answer');
    }
  });

  if (!isCorrect) {
    btns[idx].classList.add('wrong-answer');
    recordWrong();
    playWrongSound();
  } else {
    recordCorrect();
    playCorrectSound();
  }

  showFeedback(isCorrect);
}

function submitInput() {
  if (answered) return;
  const inp = document.getElementById('answer-input');
  const val = inp.value.trim();
  if (!val) return;
  answered = true;
  inp.disabled = true;

  const isCorrect = matchesAnswer(val, currentAnswer, currentIsEnJa);

  inp.className = 'answer-input ' + (isCorrect ? 'correct' : 'wrong');

  if (!isCorrect) {
    recordWrong();
    playWrongSound();
  } else {
    recordCorrect();
    playCorrectSound();
  }

  showFeedback(isCorrect);
}

function recordCorrect() {
  saveStats(1, 0);
}

function recordWrong() {
  const q = quiz[qIndex];
  const en = q.word[0];
  sessionWrongWords.push(q.word);
  if (!wrongWords.includes(en)) {
    wrongWords.push(en);
    saveWrongWords();
  }
  saveStats(0, 1);
}

function showFeedback(isCorrect) {
  const fb = document.getElementById('feedback');
  if (isCorrect) {
    fb.innerHTML = '✓ 正解！';
    fb.className = 'feedback correct show';
  } else {
    fb.innerHTML = `✗ 不正解<div class="correct-word">正解: ${currentAnswer}</div>`;
    fb.className = 'feedback wrong show';
  }
  
  const exp = document.getElementById('explanation');
  exp.innerHTML = `<div class="exp-answer">${currentAnswer}</div><div class="exp-example">"${currentExample}"</div>`;
  exp.className = 'explanation show';
  
  document.getElementById('next-btn').className = 'next-btn show';
  document.getElementById('skip-btn').disabled = true;
}

function nextQuestion() {
  qIndex++;
  if (qIndex >= quiz.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  showScreen('result');
  const correct = quiz.length - sessionWrongWords.length;
  const wrong = sessionWrongWords.length;
  const total = quiz.length;
  const pct = Math.round((correct / total) * 100);

  document.getElementById('result-score').textContent = pct + '%';
  document.getElementById('res-correct').textContent = correct;
  document.getElementById('res-wrong').textContent = wrong;
  document.getElementById('res-total').textContent = total;

  let icon = '🎉', title = '素晴らしい！';
  if (pct < 50) { icon = '💪'; title = 'もう少し！'; }
  else if (pct < 80) { icon = '👍'; title = 'よくできました！'; }

  document.getElementById('result-icon').textContent = icon;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-sub').textContent = `${total}問中 ${correct}問正解`;

  const wl = document.getElementById('wrong-list');
  const ww = document.getElementById('wrong-review-wrap');
  if (sessionWrongWords.length > 0) {
    wl.innerHTML = sessionWrongWords.map(w =>
      `<div class="wrong-item"><span class="wrong-en">${w[0]}</span><span class="wrong-ja">${w[1]}</span></div>`
    ).join('');
    ww.style.display = 'block';
  } else {
    ww.style.display = 'none';
  }
}

showScreen('home');
</script>
</body>
</html>
